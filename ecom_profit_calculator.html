<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ecom Profit Calculator</title>
<style>
  body { font-family: Arial, sans-serif; margin: 0; display: flex; height: 100vh; }
  .left, .right { padding: 20px; overflow-y: auto; }
  .left { width: 35%; border-right: 1px solid #ddd; background: #f9f9f9; }
  .right { width: 65%; }
  h2 { margin-top: 0; }
  input { width: 100%; padding: 6px; margin-bottom: 10px; }
  table { width: 100%; border-collapse: collapse; margin-top: 20px; }
  th, td { border: 1px solid #ddd; padding: 6px; text-align: center; }
  th { background: #eee; }
  .highlight { background: #e6ffe6; }
  .greenCol { background: #e6ffe6; }
  td { background: white; }
  .metrics { display: flex; gap: 20px; }
  .card { background: #f1f1f1; padding: 10px; border-radius: 8px; flex: 1; text-align: center; }
</style>
</head>
<body>

<div class="left">
  <h2>Inputs</h2>

  <h3>Product</h3>
  <label>Price per unit</label>
  <input id="price" value="7.99">

  <label>Single unit cost</label>
  <input id="costSingle" value="3.10">

  <div style="display:flex; gap:10px;">
    <div style="flex:1;">
      <label>Batch cost</label>
      <input id="costBatch" value="4.32">
    </div>
    <div style="flex:1;">
      <label>Batch size</label>
      <input id="batchSize" value="4">
    </div>
  </div>

  <label>Pricing Model</label>
  <select id="pricingModel">
    <option value="unit">Per Unit Pricing</option>
    <option value="batch">Batch Production (e.g. sticker sheets)</option>
  </select>

  
  <h3>Customer Discounts</h3>


<label>Buy X Get Y</label>
<input id="custBX" placeholder="Buy X">
<input id="custBY" placeholder="Get Y">
<select id="custBXYType">
  <option value="free">Free</option>
  <option value="percent">% Off</option>
  <option value="fixed">Amount Off Each</option>
</select>
<input id="custBXYValue" placeholder="Value">

<label>Discount Type</label>
<select id="custDiscountType">
  <option value="none">None</option>
  <option value="percent">% Discount</option>
  <option value="fixed">Fixed Discount</option>
</select>
<input id="custDiscountValue" placeholder="Value">

<label>Minimum Requirement</label>
<select id="custMinType">
  <option value="none">None</option>
  <option value="quantity">Minimum Quantity</option>
  <option value="amount">Minimum Amount</option>
</select>
<input id="custMinValue" placeholder="Value">

  <h3>Supplier Discounts</h3>


<label>Buy X Get Y</label>
<input id="suppBX" placeholder="Buy X">
<input id="suppBY" placeholder="Get Y">
<select id="suppBXYType">
  <option value="free">Free</option>
  <option value="percent">% Off</option>
  <option value="fixed">Amount Off Each</option>
</select>
<input id="suppBXYValue" placeholder="Value">

<label>Discount Type</label>
<select id="suppDiscountType">
  <option value="none">None</option>
  <option value="percent">% Discount</option>
  <option value="fixed">Fixed Discount</option>
</select>
<input id="suppDiscountValue" placeholder="Value">

<label>Minimum Requirement</label>
<select id="suppMinType">
  <option value="none">None</option>
  <option value="quantity">Minimum Quantity</option>
  <option value="amount">Minimum Amount</option>
</select>
<input id="suppMinValue" placeholder="Value">
<h3>Shipping</h3>
  <label>Customer shipping price</label>
  <input id="shipCustomer" value="4.99">

  <label>Free shipping threshold</label>
  <label><input type="checkbox" id="freeShipToggle" checked> Enable Free Shipping</label>
  <input id="freeShip" value="30">

  <label>Your shipping (first item)</label>
  <input id="shipFirst" value="5.09">

  <label>Your shipping (additional)</label>
  <input id="shipExtra" value="0.07">

  
<h3>Fees</h3>
<label>Platform fee (%)</label>
<input id="platformFeePercent" placeholder="e.g. 2.9">

<label>Fixed fee per order</label>
<input id="fixedFee" placeholder="e.g. 0.30">

<label>Payment processor fee (%)</label>
<input id="processorFeePercent" placeholder="e.g. 2.9">

<h3>Ads</h3>
  <label>CPA</label>
  <input id="cpa" value="20">
</div>

<div class="right">
  <h2>Results</h2>

  
<div style="margin-top:10px;">
  <label>Selected Quantity</label>
  <input id="selectedQty" type="number" min="1" max="24" value="6">
</div>

  <div class="metrics">
    <div class="card">
      <div>Max CPA (Break-even)</div>
      <div id="breakEven">-</div>
    </div>
    <div class="card">
      <div>Break-even ROAS</div>
      <div id="breakEvenROAS">-</div>
    </div>
    <div class="card">
      <div>Profit at CPA</div>
      <div id="profitCPA">-</div>
    </div>
  </div>

  <table id="table">
    <thead>
      <tr>
        <th style="color:black;">Quantity</th>
        <th style="color:green;">Item Revenue</th>
        <th style="color:green;">Shipping Revenue</th>
        <th style="color:green;">Total Revenue</th>
        <th style="color:red;">Item Cost</th>
        <th style="color:red;">Shipping Cost</th>
        <th style="color:red;">Total Cost (COGS + Shipping)</th>
        <th style="color:red;">Platform Fees</th>
        <th style="color:green;">Profit</th>
        <th style="color:green;">Profit After Ads</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
function calcBatchCost(n, costSingle, costBatch, batchSize) {
  let model = document.getElementById("pricingModel").value;

  // Per unit pricing
  if (model === "unit") {
    if (n < batchSize) return n * costSingle;
    let batches = Math.floor(n / batchSize);
    let remainder = n % batchSize;
    return batches * costBatch + remainder * costSingle;
  }

  // Batch production (stickers etc.)
  let batches = Math.floor(n / batchSize);
  let remainder = n % batchSize;
  let cost = batches * costBatch;

  if (remainder === 1) cost += costSingle;
  else if (remainder > 1) cost += costBatch;

  return cost;
}


function handleVisibility() {
  let custType = document.getElementById("custBXYType").value;
  document.getElementById("custBXYValue").style.display = custType === "free" ? "none" : "block";

  let suppType = document.getElementById("suppBXYType").value;
  document.getElementById("suppBXYValue").style.display = suppType === "free" ? "none" : "block";
}

function update() {
  let price = parseFloat(document.getElementById("price").value);
  let costSingle = parseFloat(document.getElementById("costSingle").value);
  let costBatch = parseFloat(document.getElementById("costBatch").value);
  let batchSize = parseInt(document.getElementById("batchSize").value);

  let shipCustomer = parseFloat(document.getElementById("shipCustomer").value);
  let freeShip = parseFloat(document.getElementById("freeShip").value);

  let shipFirst = parseFloat(document.getElementById("shipFirst").value);
  let shipExtra = parseFloat(document.getElementById("shipExtra").value);

  let cpa = parseFloat(document.getElementById("cpa").value);

  let tbody = document.querySelector("#table tbody");
  tbody.innerHTML = "";

  let bestProfit = -Infinity;
  let breakEvenCPA = 0;
  let breakEvenROAS = 0;

  for (let n = 1; n <= 24; n++) {
    
    let productCost = calcBatchCost(n, costSingle, costBatch, batchSize);

    // SUPPLIER DISCOUNTS
    let suppBX = parseFloat(document.getElementById("suppBX").value) || 0;
    let suppBY = parseFloat(document.getElementById("suppBY").value) || 0;
    let suppBXYType = document.getElementById("suppBXYType").value;
    let suppBXYValue = parseFloat(document.getElementById("suppBXYValue").value) || 0;

    let suppDiscountType = document.getElementById("suppDiscountType").value;
    let suppDiscountValue = parseFloat(document.getElementById("suppDiscountValue").value) || 0;

    let suppMinType = document.getElementById("suppMinType").value;
    let suppMinValue = parseFloat(document.getElementById("suppMinValue").value) || 0;

    let meetsMinSupp = true;
    if (suppMinType === "quantity") meetsMinSupp = n >= suppMinValue;
    if (suppMinType === "amount") meetsMinSupp = productCost >= suppMinValue;

    if (meetsMinSupp && suppBX > 0 && suppBY > 0) {
      let groups = Math.floor(n / (suppBX + suppBY));
      let discountUnits = groups * suppBY;
      let unitCostApprox = productCost / n;

      if (suppBXYType === "free") {
        productCost -= discountUnits * unitCostApprox;
      } else if (suppBXYType === "percent") {
        productCost -= discountUnits * unitCostApprox * (suppBXYValue / 100);
      } else if (suppBXYType === "fixed") {
        productCost -= discountUnits * suppBXYValue;
      }
    }

    if (meetsMinSupp) {
      if (suppDiscountType === "percent") {
        productCost *= (1 - suppDiscountValue / 100);
      } else if (suppDiscountType === "fixed") {
        productCost = Math.max(0, productCost - suppDiscountValue);
      }
    }

    let shippingCost = shipFirst + (n - 1) * shipExtra;

    
    // CUSTOMER DISCOUNTS
    let custBX = parseFloat(document.getElementById("custBX").value) || 0;
    let custBY = parseFloat(document.getElementById("custBY").value) || 0;
    let custBXYType = document.getElementById("custBXYType").value;
    let custBXYValue = parseFloat(document.getElementById("custBXYValue").value) || 0;

    let custDiscountType = document.getElementById("custDiscountType").value;
    let custDiscountValue = parseFloat(document.getElementById("custDiscountValue").value) || 0;

    let custMinType = document.getElementById("custMinType").value;
    let custMinValue = parseFloat(document.getElementById("custMinValue").value) || 0;

    let chargedQty = n;
    let goodsRevenue = n * price;

    // Check minimums
    let meetsMin = true;
    if (custMinType === "quantity") meetsMin = n >= custMinValue;
    if (custMinType === "amount") meetsMin = goodsRevenue >= custMinValue;

    if (meetsMin && custBX > 0 && custBY > 0) {
      let groups = Math.floor(n / (custBX + custBY));
      let discountUnits = groups * custBY;

      if (custBXYType === "free") {
        chargedQty = n - discountUnits;
        goodsRevenue = chargedQty * price;
      } else if (custBXYType === "percent") {
        goodsRevenue -= discountUnits * price * (custBXYValue / 100);
      } else if (custBXYType === "fixed") {
        goodsRevenue -= discountUnits * custBXYValue;
      }
    }

    if (meetsMin) {
      if (custDiscountType === "percent") {
        goodsRevenue *= (1 - custDiscountValue / 100);
      } else if (custDiscountType === "fixed") {
        goodsRevenue = Math.max(0, goodsRevenue - custDiscountValue);
      }
    }


    let freeShipEnabled = document.getElementById("freeShipToggle").checked;
    let shippingRevenue = (freeShipEnabled && goodsRevenue >= freeShip) ? 0 : shipCustomer;
    goodsRevenue = Math.max(0, goodsRevenue);
    let revenue = goodsRevenue + shippingRevenue;

    // PLATFORM FEES
    let platformPercent = parseFloat(document.getElementById("platformFeePercent").value) || 0;
    let processorPercent = parseFloat(document.getElementById("processorFeePercent").value) || 0;
    let fixedFee = parseFloat(document.getElementById("fixedFee").value) || 0;

    let percentFees = revenue * (platformPercent / 100) + revenue * (processorPercent / 100);
    let totalFees = percentFees + fixedFee;


    productCost = Math.max(0, productCost);
    let totalCost = productCost + shippingCost;
    let profit = revenue - totalCost - totalFees;
    let profitAfterAds = profit - cpa;
    let currentROAS = profit > 0 ? revenue / profit : 0;

    if (profit > bestProfit) bestProfit = profit;
    let selectedQty = parseInt(document.getElementById("selectedQty").value) || 1;
    if (n === selectedQty) {
      breakEvenCPA = profit;
      breakEvenROAS = currentROAS;
    }

    let row = `<tr class="${profit === bestProfit ? 'highlight' : ''}">
      <td>${n}</td>
      <td>${goodsRevenue.toFixed(2)}</td>
      <td>${shippingRevenue.toFixed(2)}</td>
      <td class="greenCol">${revenue.toFixed(2)}</td>
      <td>${productCost.toFixed(2)}</td>
      <td>${shippingCost.toFixed(2)}</td>
      <td style="background:#ffe6e6;">${totalCost.toFixed(2)}</td>
      <td style="background:#ffe6e6;">${totalFees.toFixed(2)}</td>
      <td class="greenCol">${profit.toFixed(2)}</td>
      <td class="greenCol">${profitAfterAds.toFixed(2)}</td>
    </tr>`;

    tbody.innerHTML += row;
  }

  document.getElementById("breakEven").innerText = "$" + breakEvenCPA.toFixed(2);
  document.getElementById("profitCPA").innerText = "$" + (breakEvenCPA - cpa).toFixed(2);
  document.getElementById("breakEvenROAS").innerText = breakEvenROAS.toFixed(2) + "x";
}

document.querySelectorAll("input, select").forEach(el => {
  el.addEventListener("change", handleVisibility);
  el.addEventListener("input", update);
});

handleVisibility();
update();
</script>

</body>
</html>
